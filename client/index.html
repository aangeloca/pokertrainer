<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokerTrainer v1.0</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="chip-mark">PT</div>
        <div>
          <h1>PokerTrainer</h1>
          <p>GTO Lab v1.0</p>
        </div>
      </div>

      <nav class="nav" aria-label="Navegacao principal">
        <button class="nav-item active" data-view="dashboard" type="button">Dashboard</button>
        <button class="nav-item" data-view="lessons" type="button">Licoes</button>
        <button class="nav-item" data-view="trainer" type="button">Drill GTO</button>
        <button class="nav-item" data-view="ranges" type="button">Ranges</button>
        <button class="nav-item" data-view="glossary" type="button">Glossario</button>
      </nav>

      <div class="profile-card" id="profile-card">
        <span class="eyebrow">Perfil local</span>
        <strong id="profile-name">Sem usuario</strong>
        <button id="logout-btn" class="link-button" type="button">Trocar usuario</button>
      </div>
    </aside>

    <main class="main-panel">
      <section id="login-view" class="login-view">
        <div class="login-copy">
          <span class="eyebrow">Treino local e persistente</span>
          <h2>Transforme decisoes de poker em repeticao inteligente.</h2>
          <p>Estude fundamentos GTO, pratique spots de decisao, compare ranges preflop e acompanhe sua evolucao.</p>
        </div>
        <form id="login-form" class="login-form">
          <label for="username-input">Usuario</label>
          <input id="username-input" name="username" type="text" maxlength="24" autocomplete="off" placeholder="ex: Angelo">
          <button class="primary-button" type="submit">Entrar no treino</button>
          <p id="login-error" class="form-error" role="alert"></p>
        </form>
      </section>

      <section id="app-view" class="hidden">
        <header class="topbar">
          <div>
            <span class="eyebrow" id="view-kicker">Dashboard</span>
            <h2 id="view-title">Plano de treino</h2>
          </div>
          <div class="topbar-actions">
            <button id="quick-drill-btn" class="secondary-button" type="button">Proximo spot</button>
          </div>
        </header>

        <p id="global-error" class="global-error hidden" role="alert"></p>

        <section id="dashboard-view" class="view-panel"></section>
        <section id="lessons-view" class="view-panel hidden"></section>
        <section id="lesson-player-view" class="view-panel hidden"></section>
        <section id="trainer-view" class="view-panel hidden"></section>
        <section id="ranges-view" class="view-panel hidden"></section>
        <section id="glossary-view" class="view-panel hidden"></section>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
